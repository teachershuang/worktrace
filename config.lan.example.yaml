llm:
  base_url: "http://192.168.8.29:4000/v1"
  api_key: "replace-with-lan-llm-api-key"
  model: "Qwen3.6-35B-A3B-GGUF"
  timeout_seconds: 120
  trust_env: false

ocr:
  url: "http://192.168.8.29:8866/ocr"
  timeout_seconds: 60
  protocol: "paddle_json"
  trust_env: false

recording:
  work_periods:
    - "09:00-12:00"
    - "13:30-18:00"
  screenshot_interval_seconds: 300
  short_poll_interval_seconds: 5
  idle_skip_minutes: 10
  enable_tray: false

storage:
  data_dir: "data"
  report_output_dir: "data/reports"
  log_dir: "logs"
